name: Build production Android app (Play Store AAB) ⚡

on:
  workflow_dispatch: # Manual trigger
  release:
    types: [published] # Triggers on new releases (from any branch)
  push:
    # TODO: Temporary trigger for testing Android builds on feature branches
    branches:
      - 'config/android-ci'

jobs:
  build-android-production:
    name: Build Android production .aab (Play Store) and upload artifact
    uses: ./.github/workflows/_build-android.yml
    with:
      build_command: yarn build:android:production:aab
      artifact_suffix: play
      package_mode: aab
      enable_signing: true
    secrets: inherit
