name: Typescript Errors Check

on:
  push:
    branches:
      - v2
      - main
      - 'release/*'
  pull_request:
    types: ['opened', 'ready_for_review', 'synchronize']
    branches:
      - v2
      - main
      - 'release/*'
  workflow_dispatch:

concurrency:
  group: typescript-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typescript-errors:
    # Prevent running this workflow for PRs that are not ready for review
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 🛎️
        uses: actions/checkout@v6

      - name: Add SSH key to checkout a private repo
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Git submodules init
        run: git submodule init
        shell: bash

      - name: Git submodules update
        run: git submodule update
        shell: bash

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Node.js ⚙️
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: yarn setup
        shell: bash

      - name: Ensure no new Typescript errors are introduced
        run: yarn extension:type:check-new
        shell: bash
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Comment on PR with TypeScript errors
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ TypeScript errors were detected. Please fix the errors before merging.\n\nRun `yarn extension:type:check-new` locally to see the errors.'
            })
