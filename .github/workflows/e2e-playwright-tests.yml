name: E2E Playwright Tests

on:
  push:
    branches:
      - v2
      - main
  pull_request:
    types: ['opened', 'ready_for_review', 'synchronize']
    branches:
      - v2
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    environment: testing
    # This will run for pushes, PRs, and manual dispatch

    env:
      IS_TESTING: 'true'
      E2E_DEBUG: ${{ vars.E2E_DEBUG }}
      RELAYER_URL: ${{ vars.RELAYER_URL }}
      VELCRO_URL: ${{ vars.VELCRO_URL }}
      LI_FI_API_KEY: ${{ vars.LI_FI_API_KEY }}
      BUNGEE_API_KEY: ${{ vars.BUNGEE_API_KEY }}
      SAFE_API_KEY: ${{ vars.SAFE_API_KEY }}
      REACT_APP_PIMLICO_API_KEY: ${{ vars.REACT_APP_PIMLICO_API_KEY }}
      REACT_APP_ETHERSPOT_API_KEY: ${{ vars.REACT_APP_ETHERSPOT_API_KEY }}
      REACT_APP_CANDIDE_API_KEY: ${{ vars.REACT_APP_CANDIDE_API_KEY }}
      REACT_APP_GELATO_API_KEY: ${{ vars.REACT_APP_GELATO_API_KEY }}
      KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
      SEED: ${{ secrets.SEED }}
      SEED_24_WORDS: ${{ secrets.SEED_24_WORDS }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      BA_ACCOUNTS: ${{ vars.BA_ACCOUNTS }}
      BA_KEYSTORE_UID: ${{ vars.BA_KEYSTORE_UID }}
      BA_KEYS: ${{ vars.BA_KEYS }}
      BA_SECRETS: ${{ secrets.BA_SECRETS }}
      BA_SEEDS: ${{ vars.BA_SEEDS }}
      BA_LEARNED_ASSETS: ${{ vars.BA_LEARNED_ASSETS }}
      BA_SELECTED_ACCOUNT: ${{ vars.BA_SELECTED_ACCOUNT }}
      SA_ACCOUNTS: ${{ vars.SA_ACCOUNTS }}
      SA_KEYSTORE_UID: ${{ vars.SA_KEYSTORE_UID }}
      SA_KEYS: ${{ vars.SA_KEYS }}
      SA_SECRETS: ${{ secrets.SA_SECRETS }}
      SA_SEEDS: ${{ vars.SA_SEEDS }}
      SA_LEARNED_ASSETS: ${{ vars.SA_LEARNED_ASSETS }}
      SA_SELECTED_ACCOUNT: ${{ vars.SA_SELECTED_ACCOUNT }}
      SA_ACCOUNT_JSON: ${{ secrets.SA_ACCOUNT_JSON }}
      DEFAULT_INVITATION_CODE_DEV: ${{ vars.DEFAULT_INVITATION_CODE_DEV }}
      SHOULD_RUN_TREZOR_TESTS: 'true'
      PLAYWRIGHT_SKIP_GIT_METADATA: '1' # Optional fix to avoid Git fetch timeout
      # Enables Playwright to intercept network requests initiated by Service Workers.
      # We use it to mock or block background requests that can't be intercepted via page.route().
      PW_EXPERIMENTAL_SERVICE_WORKER_NETWORK_EVENTS: '1'
      IS_LEDGER_EMULATOR: 'true'
      
    steps:
      - name: Checkout full Git history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add SSH key to checkout a private repo
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Git submodules init
        run: git submodule init
        shell: bash

      - name: Git submodules update
        run: git submodule update
        shell: bash

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Node.js ⚙️
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        run: yarn setup:ci
        shell: bash

      - name: Build webkit extension
        run: yarn build:web:webkit

      - name: Start trezor-emulator container
        run: |
          docker pull ghcr.io/trezor/trezor-user-env
          docker compose -f ./docker-compose-mac.yml up --force-recreate -d

      - name: Start ledger emulator
        working-directory: ./e2e-playwright-tests/ledger-emulator
        run: |
          ./start-emulator.sh
      # This is a temporary solution of installing the dependencies here.
      # Once we've migrated to yarn in the e2e tests,
      # we can remove this step and install the dependencies
      # from the package.json file in the e2e-playwright-tests directory of the project.
      - name: Check ledger emulator connection
        working-directory: ./e2e-playwright-tests/ledger-emulator
        run: |
          npm -g i ts-node
          npm i \
           @ledgerhq/hw-transport-node-speculos@6.28.0  \
           @ledgerhq/hw-app-eth@7.3.2 \
            ethers@6.14.1
          ts-node ledger-emulator-health-check.ts

      - name: Install e2e test dependencies
        working-directory: ./e2e-playwright-tests
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: ./e2e-playwright-tests
        run: echo "PLAYWRIGHT_VERSION=$(node -p 'require("./node_modules/@playwright/test/package.json").version')" >> $GITHUB_ENV

      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        working-directory: ./e2e-playwright-tests
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run Balance Check test for SA and BA
        working-directory: ./e2e-playwright-tests
        run: npm run balance:test

      - name: Run Playwright tests (autoLogin:test, debugging)
        working-directory: ./e2e-playwright-tests
        run: npm run autoLogin:test

      - name: Zip HTML report
        if: always()
        working-directory: ./e2e-playwright-tests
        run: |
          zip -r playwright-report.zip html-report/
        continue-on-error: true

      - name: Save test report as artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            ./e2e-playwright-tests/playwright-report.zip
            ./build/webkit-prod/
            ./lavamoat/webpack/
