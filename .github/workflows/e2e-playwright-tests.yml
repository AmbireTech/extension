        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./e2e-playwright-tests
        run: yarn playwright install --with-deps chromium

      - name: Start trezor-emulator container
        run: |
          docker pull ghcr.io/trezor/trezor-user-env
          docker compose -f ./docker-compose-mac.yml up --force-recreate -d

      - name: Run Trezor tests
        working-directory: ./e2e-playwright-tests
        run: yarn trezor:test

      - name: Upload trezor blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-trezor
          path: ./e2e-playwright-tests/blob-report/
          retention-days: 7

  # ============================================================
  # 6. Merge reports
  # ============================================================
  merge-and-report:
    runs-on: ubuntu-latest
    needs: [e2e-non-hw, e2e-ledger, e2e-trezor]
    if: always()

    steps:
      - name: Download all blob reports
        uses: actions/download-artifact@v6
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports into HTML
        working-directory: ./e2e-playwright-tests
        run: |
          mkdir -p all-blob-reports
          yarn playwright merge-reports --reporter html ./all-blob-reports || true

      - name: Upload final Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: ./e2e-playwright-tests/playwright-report/
          retention-days: 14