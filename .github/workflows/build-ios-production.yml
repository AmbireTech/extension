name: Build production iOS app ⚡

on:
  workflow_dispatch: # Manual trigger
  release:
    types: [published] # Triggers on new releases (from any branch)
  # TODO: Temporary, while testing iOS signing, run this on every commit to config/ci-ios-with-signing.
  push:
    branches:
      - config/ci-ios-with-signing

jobs:
  build-ios-production:
    name: Build iOS production .ipa and upload artifact
    uses: ./.github/workflows/_build-ios-reusable.yml
    with:
      build_command: yarn build:ios:production
      artifact_suffix: production
      package_mode: production
      enable_signing: true
    secrets: inherit
