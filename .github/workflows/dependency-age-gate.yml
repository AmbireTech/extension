name: Dependency age gate

on:
  push:
    branches:
      - v2
      - main
      - 'release/*'
  pull_request:
    types: ['opened', 'ready_for_review', 'synchronize']
    branches:
      - v2
      - main
      - 'release/*'
  workflow_dispatch:

jobs:
  dep-age:
    # Prevent running this workflow for PRs that are not ready for review
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Needed so `git show origin/main:yarn.lock` works reliably
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies (frozen lockfile)
        run: yarn install --frozen-lockfile

      - name: Dependency age check
        shell: bash
        run: |
          echo "Fetching base branch origin/${{ github.base_ref }} for lockfile diff"
          git fetch origin "${{ github.base_ref }}" --depth=1

          echo "Running dependency age check"
          node check-dep-age.js 14
